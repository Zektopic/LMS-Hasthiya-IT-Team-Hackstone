name: hackston_lms
description: A full-fledged Learning Management System built with Flutter and Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  firebase_core: ^4.6.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.4.3
  provider: ^6.0.5
  google_fonts: ^8.1.0
  http: ^1.1.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  video_player: ^2.7.0
  chewie: ^1.14.1
  package_info_plus: ^10.1.0
  google_sign_in: ^7.2.0
  envied: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  envied_generator: ^1.3.5
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "assets/icon.png"
