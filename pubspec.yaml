name: hasthiya_lms
description: A full-fledged Learning Management System built with Flutter and Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  firebase_core: ^2.15.0
  firebase_auth: ^4.7.0
  cloud_firestore: ^4.8.2
  firebase_storage: ^11.2.4
  provider: ^6.0.5
  google_fonts: ^6.2.1
  http: ^1.1.0
  cached_network_image: ^3.2.3
  intl: ^0.18.1
  video_player: ^2.7.0
  chewie: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
